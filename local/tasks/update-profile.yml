---
- name: Add environment variables to .profile
  ansible.builtin.lineinfile:
    path: ~/.profile
    line: "export {{ item.name }}={{ item.value }}"
    regexp: "^export {{ item.name }}="
    state: "present"
  loop:
    - { name: 'GIT_EDITOR', value: 'nvim' }
    - { name: 'EDITOR', value: 'nvim' }
    - { name: 'VISUAL', value: 'nvim' }
    - { name: 'BROWSER', value: 'chromium' }
    - { name: 'GIT_AUTHOR_NAME', value: 'michael' }
    - { name: 'GIT_AUTHOR_EMAIL', value: 'eblakem@gmail.com' }
    - { name: 'GIT_COMMITTER_NAME', value: 'michael' }
    - { name: 'GIT_COMMITTER_EMAIL', value: 'eblakem@gmail.com' }
