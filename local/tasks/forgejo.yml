---
- name: Ensure Podman Quadlet directory exists
  ansible.builtin.file:
    path: ~/.config/containers/systemd
    state: directory

- name: Create Forgejo Quadlet container file
  ansible.builtin.copy:
    dest: ~/.config/containers/systemd/forgejo.container
    content: |
      [Unit]
      Description=Forgejo Git Service

      [Container]
      Image=codeberg.org/forgejo/forgejo:latest
      Volume=forgejo_data:/data
      PublishPort=3000:3000
      PublishPort=2222:22
      Environment=FORGEJO__database__DB_TYPE=sqlite3
      Environment=FORGEJO__packages__ENABLED=true
      Environment=FORGEJO__server__DOMAIN=localhost
      Environment=FORGEJO__server__ROOT_URL=http://localhost:3000/

      [Service]
      Restart=always

      [Install]
      WantedBy=default.target

- name: Reload systemd user daemon
  ansible.builtin.systemd:
    daemon_reload: yes
    scope: user

- name: Enable and start Forgejo container service
  ansible.builtin.systemd:
    name: forgejo
    enabled: yes
    state: started
    scope: user
